<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title></title>
	<script src="https://cdn.jsdelivr.net/npm/p5@1.11.11/lib/p5.min.js
"></script>
</head>
<body>
	<script>
		function setup(){
			createCanvas(400, 400)
		}

		function draw(){
			background("#FAEBED");
			stroke("ABFFF1")
			strokeWeight(3)
			fill("#391E63")
			ellipse(200, 230, 150, 80);
			fill("#FF5768")
			circle(100, 120, 80);
			fill("#46923c")
			rect(250, 300, 120, 70)
			line(5, 10, 60, 70)
		}
	</script>

</body>
</html>

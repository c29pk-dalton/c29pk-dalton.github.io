<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title></title>

	<style>
		.container {
			display: grid;
			grid-template-columns: repeat(4,1fr);
			column-gap: 12px;
			row-gap: 12px;
		}

		.item {
			/*border: 1px solid black;*/

		}

		.item img {
			width: 100%;
			height: 100%;
			object-fit: cover;
		}

		#item1{
			/*grid-column:1/3;*/
		}

		@media (max-width: 800px) {
			.container {
				grid-template-columns: repeat(2, 1fr);
			}
		}
	</style>
</head>
<body>

<div class="container"> 
	<div class="item" id="item1">
		<img src="sunset.jpg" alt="sunset">
	</div>

	<div class="item">
	<img src="nyc.jpg" alt="new york city">
	</div>

	<div class="item">
		<img src="paris.jpg" alt="paris">
	</div>

	<div class="item">
				<img src="madrid.jpg" alt="madrid">
	</div>

	<div class="item">
				<img src="tokyo.jpg" alt="tokyo">
	</div>

	<div class="item">
				<img src="rome.jpg" alt="rome">
	</div>

	<div class="item">
				<img src="swissalps.jpg" alt="swiss alps">
	</div>

	<div class="item">
				<img src="london.jpg" alt="london">
	</div>

	<div class="item">
				<img src="lisbon.jpg" alt="lisbon">
	</div>

	<div class="item">
				<img src="costarica.jpg" alt="costa rica">
	</div>

	<div class="item">
				<img src="la.jpg" alt="los angeles">
	</div>

	<div class="item">
				<img src="phoenix.jpg" alt="phoenix">
	</div>

</div>

</body>
</html>

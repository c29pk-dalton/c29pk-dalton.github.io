<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title></title>
	<script src="https://cdn.jsdelivr.net/npm/p5@1.11.11/lib/p5.min.js
"></script>
</head>
<body>
	<script>
		function setup(){
			createCanvas(400, 400)
		}

		

		function draw(){
			background("#FAEBED");
			for (let i=0; i<5; i++){
				for(let j = 0; j < 11; j++){
					let x = i*100
					let y = j*100

					circle(x, y, 100);
					text(i + "," + j, x, y)
				}
				
			}
		}
			
		


	</script>

</body>
</html>

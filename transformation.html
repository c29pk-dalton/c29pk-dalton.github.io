<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title></title>
	<script src="https://cdn.jsdelivr.net/npm/p5@1.11.11/lib/p5.min.js
"></script>
</head>
<body>

	<script> 
		function setup() {
			createCanvas(800, 800)
		}

		function draw() {
			background(200)
			push()
			translate(100,100)
			//rotate(PI/8)
			rotate(frameCount * 0.01)
			 rectMode(CENTER)
			rect(0, 0, 100, 50)
			pop()

			push()
			translate(width/2, height/2)
			rotate(frameCount * 0.01)
			rectMode(CENTER)

			rect(0, 0, 120, 40)
		}

	</script>

</body>
</html>

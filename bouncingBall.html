<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title></title>
	<script src="https://cdn.jsdelivr.net/npm/p5@1.11.11/lib/p5.min.js
"></script>
</head>
<body>

	<script> 


		let xpos
		let ypos
		let xspeed
		let yspeed
		let d=50
		let fillColor = "blue"



		function setup() {
			createCanvas(800, 800)
			xpos = width/2
			ypos = height/2
			xspeed = 5
			yspeed = 8 
		}

		function draw() {
			background(200)

			// if xpos is larger than width (800), reverse the direction
			if (xpos+25>width || xpos+25<0) {
				//
				xspeed = xspeed * -1
			}

			if (ypos>height || ypos<0) {
				//
				yspeed = yspeed * -1
			}

			//if xpos is larger than width/2 AND ypos is less than height/2, chance color
			changeBallColor("pink","black","blue", "red")

			ypos += yspeed
			xpos += xspeed
	
			fill(fillColor)
			circle(xpos, ypos, 50)
		}

		function changeBallColor(topRightColor, bottomRightColor, bottomLeftColor, topLeftColor) 
		{

			if (xpos > width/2 && ypos < height/2) {
				fillColor= topRightColor
			} else if (xpos > width/2 && ypos > height/2){
				fillColor=bottomRightColor
			} else if (xpos < width/2 && ypos > height/2){
				fillColor=bottomLeftColor
			} else if (xpos < width/2 && ypos < height/2){
				fillColor=topLeftColor
			}

		}


	</script>

</body>
</html>
